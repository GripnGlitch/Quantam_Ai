    <style>
        /* ========================
           OBSIDIAN AGENCY CUSTOM STYLES
        ======================== */
        body {
            background: #000000;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'JetBrains Mono', monospace;
        }
        /* Dot matrix background (subtle) */
        .bg-dot-matrix {
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        /* Ripple effect circle */
        .click-circle {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,198,255,0.6) 0%, rgba(0,198,255,0) 70%);
            pointer-events: none;
            animation: rippleAnim 0.5s ease-out forwards;
            z-index: 9999;
        }
        @keyframes rippleAnim {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }
        /* Role glows */
        .role-glow-admin { box-shadow: 0 0 6px 0 #ff4757; }
        .role-glow-moderator { box-shadow: 0 0 6px 0 #00ffff; }
        .role-glow-leader { box-shadow: 0 0 6px 0 #ffa502; }
        /* Log line borders */
        .log-line-admin { border-left: 3px solid #ff4757; padding-left: 0.75rem; }
        .log-line-moderator { border-left: 3px solid #00ffff; padding-left: 0.75rem; }
        .log-line-leader { border-left: 3px solid #ffa502; padding-left: 0.75rem; }
        .log-line-member { border-left: 3px solid #888; padding-left: 0.75rem; }
        /* Force desktop view overrides */
        body.force-desktop-view .sidebar {
            position: static !important;
            width: 16rem !important;
            transform: none !important;
        }
        body.force-desktop-view .main-chat {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Finisher header container */
        .finisher-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        header {
            position: relative;
            z-index: 10;
            background: transparent;
        }
        /* Glitch hover for buttons */
        .glitch-hover:hover {
            transform: translateX(2px);
            transition: transform 0.1s ease;
        }
    </style>
</head>

    <script type="module">
        import * as THREE from "three";
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, arrayUnion, arrayRemove, serverTimestamp, addDoc, Timestamp } from "firebase/firestore";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "firebase/storage";
        import { getMessaging, getToken, onMessage } from "firebase/messaging";
        import { getAnalytics } from "firebase/analytics";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAvq0v6LeGbB0FyOhvOGCoSmc0kogCZx_4",
            authDomain: "resistance-webapp.firebaseapp.com",
            projectId: "resistance-webapp",
            storageBucket: "resistance-webapp.firebasestorage.app",
            messagingSenderId: "985571028111",
            appId: "1:985571028111:web:53d7a322dd998d7ad814fa"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const messaging = getMessaging(app);
        const analytics = getAnalytics(app);

        // Global vars
        let currentUser = null;
        let currentView = "dashboard";
        let currentPrivateChatWith = null;
        let currentGroupChatId = null;
        let currentAIModel = "mistralai/Mistral-7B-Instruct-v0.3";
        let currentAIMode = "general";
        let randomMode = false;

        function showToast(msg) { alert(msg); }

        // --- Three.js Loading Animation (Her - OS1 style) ---
        const loadingDiv = document.getElementById('loadingCanvas');
        const loadingText = document.getElementById('loadingText');
        let scene, camera, renderer, group, ring, ringcover;
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(65, 1, 1, 10000);
            camera.position.z = 150;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 1);
            loadingDiv.appendChild(renderer.domElement);

            group = new THREE.Group();
            const length = 30;
            const radius = 5.6;
            const geometry = new THREE.SphereGeometry(radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0x00c6ff, emissive: 0x004466 });
            for (let i = 0; i < length; i++) {
                const sphere = new THREE.Mesh(geometry, material);
                const angle = (i / length) * Math.PI * 2;
                sphere.position.x = Math.cos(angle) * 40;
                sphere.position.y = Math.sin(angle) * 40;
                sphere.position.z = Math.sin(angle * 2) * 20;
                group.add(sphere);
            }
            scene.add(group);

            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            let rotatevalue = 0.035;
            function animate() {
                requestAnimationFrame(animate);
                group.rotation.x += rotatevalue * 0.5;
                group.rotation.y += rotatevalue;
                group.rotation.z += rotatevalue * 0.3;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
        initThree();

        // Hide loading screen after auth
        function hideLoading() {
            loadingDiv.style.display = 'none';
            loadingText.style.display = 'none';
        }

        // --- Finisher Header init (after app shown) ---
        function initFinisherHeader() {
            const headerEl = document.querySelector('.finisher-header');
            if (headerEl && typeof FinisherHeader !== 'undefined') {
                new FinisherHeader({
                    element: headerEl,
                    count: 70,
                    size: { min: 1, max: 12, pulse: 0.1 },
                    speed: { x: { min: 0, max: 0.4 }, y: { min: 0, max: 0.6 } },
                    colors: { background: "#201e30", particles: ["#fbfcca", "#d7f3fe", "#ffd0a7"] },
                    blending: "overlay",
                    opacity: { center: 1, edge: 0.95 },
                    skew: -2.1,
                    shapes: ["c"]
                });
            }
        }

        // --- View mode toggle (mobile/desktop) ---
        function initViewMode() {
            const saved = localStorage.getItem('resistanceViewMode');
            if (saved === 'desktop') document.body.classList.add('force-desktop-view');
            document.getElementById('viewMobileBtn').addEventListener('click', () => {
                document.body.classList.remove('force-desktop-view');
                localStorage.setItem('resistanceViewMode', 'mobile');
            });
            document.getElementById('viewDesktopBtn').addEventListener('click', () => {
                document.body.classList.add('force-desktop-view');
                localStorage.setItem('resistanceViewMode', 'desktop');
            });
        }

        // --- Ripple effect only on auth container ---
        function initRipple() {
            const authContainer = document.querySelector('#authScreen .glass-panel');
            if (authContainer) {
                authContainer.addEventListener('click', (e) => {
                    const circle = document.createElement('div');
                    circle.classList.add('click-circle');
                    const rect = authContainer.getBoundingClientRect();
                    circle.style.left = `${e.clientX - rect.left - 20}px`;
                    circle.style.top = `${e.clientY - rect.top - 20}px`;
                    circle.style.position = 'absolute';
                    authContainer.appendChild(circle);
                    setTimeout(() => circle.remove(), 500);
                });
            }
        }

        // --- Sound on login button ---
        function initSound() {
            const loginBtn = document.getElementById('loginBtn');
            const audio = document.getElementById('loginSound');
            if (loginBtn && audio) {
                loginBtn.addEventListener('click', () => {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log("Audio play failed"));
                });
            }
        }

        // --- Dummy loadView for demonstration (simplified) ---
        async function loadView(view) {
            const container = document.getElementById('mainContent');
            if (view === 'dashboard') {
                container.innerHTML = `<div class="glass-panel p-6 border border-white/10 bg-black/80"><h2 class="text-xl font-bold mb-4">DASHBOARD</h2><p>Welcome to Resistance. Use the sidebar to navigate.</p></div>`;
            } else {
                container.innerHTML = `<div class="glass-panel p-6 border border-white/10 bg-black/80"><p>View ${view} – ready for full implementation.</p></div>`;
            }
        }

        // --- Authentication handlers (simplified for demo) ---
        async function handleLogin() {
            const accessCode = document.getElementById('loginAccessCode').value.trim();
            const memberCode = document.getElementById('loginMemberCode').value.trim();
            if (!accessCode || !memberCode) return showToast("Enter both codes");
            let role = null;
            if (memberCode === "AMI-021") role = "admin";
            else if (memberCode === "OE1-266") role = "moderator";
            else if (memberCode === "LAO-012") role = "leader";
            else if (memberCode === "MEI-021") role = "member";
            else return showToast("Invalid Member Code");
            const userDoc = await getDoc(doc(db, "users", accessCode));
            if (!userDoc.exists()) return showToast("Access Code not found");
            const userData = userDoc.data();
            if (userData.role !== role) return showToast("Member Code mismatch");
            currentUser = { accessCode, ...userData };
            localStorage.setItem("resistanceUser", JSON.stringify({ accessCode, role }));
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userRoleBadge').innerText = role.toUpperCase();
            document.getElementById('userIdDisplay').innerText = accessCode;
            if (role === "admin" && userData.communityId === "VibeVault") {
                document.getElementById('userRoleBadge').innerText = "LEADER";
            }
            await updateDoc(doc(db, "users", accessCode), { online: true, lastSeen: serverTimestamp() });
            initFinisherHeader();
            loadView('dashboard');
            hideLoading();
        }

        async function validateMemberCode() {
            const memberCode = document.getElementById('signupMemberCode').value.trim();
            let role = null;
            if (memberCode === "AMI-021") role = "admin";
            else if (memberCode === "OE1-266") role = "moderator";
            else if (memberCode === "LAO-012") role = "leader";
            else if (memberCode === "MEI-021") role = "member";
            else return showToast("Invalid Member Code");
            window.validatedRole = role;
            window.validatedMemberCode = memberCode;
            document.getElementById('communitySelect').disabled = false;
            document.getElementById('signupStep1').classList.add('hidden');
            document.getElementById('signupStep2').classList.remove('hidden');
        }

        async function finalSignup() { /* simplified – would create user */ showToast("Signup complete (demo)"); }

        // --- Event listeners & init ---
        document.getElementById('authLoginTab').onclick = () => {
            document.getElementById('authLoginPanel').classList.remove('hidden');
            document.getElementById('authSignupPanel').classList.add('hidden');
        };
        document.getElementById('authSignupTab').onclick = () => {
            document.getElementById('authSignupPanel').classList.remove('hidden');
            document.getElementById('authLoginPanel').classList.add('hidden');
        };
        document.getElementById('loginBtn').onclick = handleLogin;
        document.getElementById('validateMemberCodeBtn').onclick = validateMemberCode;
        document.getElementById('finalSignupBtn').onclick = finalSignup;
        document.getElementById('backToMemberCodeBtn').onclick = () => {
            document.getElementById('signupStep2').classList.add('hidden');
            document.getElementById('signupStep1').classList.remove('hidden');
        };
        document.getElementById('forgotCodeBtn').onclick = () => {
            document.getElementById('recoveryModal').classList.remove('hidden');
        };
        document.getElementById('closeRecoveryModal').onclick = () => document.getElementById('recoveryModal').classList.add('hidden');
        document.getElementById('recoverySubmitBtn').onclick = () => { showToast("Recovery not implemented in demo"); };
        document.getElementById('addQuestionBtn').onclick = () => {
            const container = document.getElementById('securityQuestionsContainer');
            const div = document.createElement('div');
            div.className = 'question-item mb-2';
            div.innerHTML = `<input type="text" class="q-text w-full bg-black/50 border border-white/20 rounded-none px-2 py-1 mb-1" placeholder="Question"><input type="text" class="a-text w-full bg-black/50 border border-white/20 rounded-none px-2 py-1" placeholder="Answer">`;
            container.appendChild(div);
        };
        const settingsBtn = document.getElementById('settingsButton');
        const dropdown = document.getElementById('settingsDropdown');
        settingsBtn.onclick = () => dropdown.classList.toggle('hidden');
        document.getElementById('devPanelOption').onclick = () => {
            dropdown.classList.add('hidden');
            if (currentUser?.role === 'admin') {
                if (typeof eruda !== 'undefined') eruda.init();
                else showToast("Eruda not loaded");
            } else showToast("Admin only");
        };
        document.getElementById('logoutOption').onclick = () => {
            localStorage.removeItem('resistanceUser');
            location.reload();
        };
        document.getElementById('sidebarToggle').onclick = () => document.getElementById('sidebar').classList.toggle('sidebar-closed');
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => loadView(btn.getAttribute('data-view'));
        });

        // Initial auth check
        (async () => {
            const saved = localStorage.getItem('resistanceUser');
            if (saved) {
                const { accessCode, role } = JSON.parse(saved);
                const userDoc = await getDoc(doc(db, "users", accessCode));
                if (userDoc.exists()) {
                    currentUser = { accessCode, ...userDoc.data() };
                    document.getElementById('authScreen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('userRoleBadge').innerText = role.toUpperCase();
                    document.getElementById('userIdDisplay').innerText = accessCode;
                    if (role === "admin" && currentUser.communityId === "VibeVault") {
                        document.getElementById('userRoleBadge').innerText = "LEADER";
                    }
                    await updateDoc(doc(db, "users", accessCode), { online: true, lastSeen: serverTimestamp() });
                    initFinisherHeader();
                    loadView('dashboard');
                    hideLoading();
                    return;
                }
            }
            // Show auth screen
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
            hideLoading(); // hide loading after a short delay
            setTimeout(() => hideLoading(), 500);
        })();

        initViewMode();
        initRipple();
        initSound();
    </script>
    <!-- Service Worker registration (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error', err));
        }
    </script>
</body>
</html>
