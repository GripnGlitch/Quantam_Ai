<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="manifest" href="manifest.json">

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <meta name="theme-color" content="#000000">
    <!-- CSS & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
        body { background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container {
            position: relative;
            width: 850px;
            height: 550px;
            background: #0a0a0a;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(255,0,0,0.15);
            overflow: hidden;
            border: 1px solid rgba(255,60,60,0.2);
        }
        .form-box {
            position: absolute;
            right: 0;
            width: 50%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            color: #e0e0e0;
            text-align: center;
            padding: 40px;
            z-index: 1;
            transition: 0.6s ease-in-out 1.2s, visibility 0s 1s;
        }
        .container.active .form-box { right: 50%; }
        .form-box.register { visibility: hidden; }
        .container.active .form-box.register { visibility: visible; }
        h1 { font-size: 36px; margin: -10px 0; color: #ff4757; font-weight: 700; }
        .input-box { position: relative; margin: 30px 0; }
        .input-box input, .input-box select, .input-box textarea {
            width: 100%;
            padding: 13px 50px 13px 20px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            outline: none;
            font-size: 16px;
            color: #f0f0f0;
        }
        .input-box input:focus, .input-box select:focus { border-color: #ff4757; box-shadow: 0 0 5px #ff4757; }
        .input-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #ff4757; }
        .forgot-link { margin: -15px 0 15px; text-align: right; }
        .forgot-link a { font-size: 14px; color: #aaa; }
        .btn {
            width: 100%;
            height: 48px;
            background: #ff4757;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            transition: all 0.2s;
        }
        .btn:hover { background: #aa2e78; transform: scale(1.02); box-shadow: 0 0 12px #ff4757; }
        .toggle-box { position: absolute; width: 100%; height: 100%; }
        .toggle-box::before {
            content: "";
            position: absolute;
            left: -250%;
            width: 300%;
            height: 100%;
            background: linear-gradient(135deg, #aa2e78, #ff4757);
            border-radius: 150px;
            z-index: 2;
            transition: 1.8s ease-in-out;
        }
        .container.active .toggle-box::before { left: 50%; }
        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: 0.6s ease-in-out;
        }
        .toggle-panel.toggle-left { left: 0; transition-delay: 1.2s; }
        .container.active .toggle-panel.toggle-left { left: -50%; transition-delay: 0.6s; }
        .toggle-panel.toggle-right { right: -50%; transition-delay: 0.6s; }
        .container.active .toggle-panel.toggle-right { right: 0; transition-delay: 1.2s; }
        .toggle-panel p { margin-bottom: 20px; font-size: 14px; }
        .toggle-panel .btn { width: 160px; background: transparent; border: 2px solid #fff; }
        .cf-turnstile { margin: 15px 0; display: flex; justify-content: center; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #aa2e78;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .thinking-block { background: #2a2a2a; border-left: 3px solid #ffa502; padding: 0.5rem; margin-bottom: 0.5rem; font-size: 0.85rem; color: #ccc; font-style: italic; }
        .typing-slider { width: 100%; margin: 0.5rem 0; }
        #errorDisplay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ff0000;
            color: white;
            padding: 8px;
            z-index: 9999;
            font-size: 12px;
            display: none;
            word-break: break-word;
        }
        @media screen and (max-width: 650px) {
            .container { height: calc(100vh - 40px); }
            .form-box { bottom: 0; width: 100%; height: 70%; }
            .container.active .form-box { right: 0; bottom: 30%; }
            .toggle-box::before { left: 0; top: -270%; width: 100%; height: 300%; border-radius: 20vw; }
            .container.active .toggle-box::before { left: 0; top: 70%; }
            .toggle-panel { width: 100%; height: 30%; }
            .toggle-panel.toggle-left { top: 0; }
            .container.active .toggle-panel.toggle-left { left: 0; top: -30%; }
            .toggle-panel.toggle-right { right: 0; bottom: -30%; }
            .container.active .toggle-panel.toggle-right { bottom: 0; }
        }
        @media screen and (max-width: 400px) {
            .form-box { padding: 20px; }
            .toggle-panel h1 { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div id="errorDisplay"></div>

    <!-- Loading screen -->
    <div id="loadingCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; background:#000; display:flex; justify-content:center; align-items:center; flex-direction:column;">
        <div style="font-family:monospace; color:#ff4757; font-size:1.2rem;">RESISTANCE</div>
    </div>

    <!-- Main app -->
    <div id="app" class="hidden" style="min-height:100vh; background:#000; width:100%;">
        <header style="background:#0a0a0a; border-bottom:1px solid #ff4757; padding:12px 24px; display:flex; justify-content:space-between; align-items:center;">
            <h1 style="color:#ff4757; font-size:1.5rem;">Resistance</h1>
            <div>
                <span id="userRoleBadge" style="background:#aa2e78; padding:4px 10px; border-radius:20px; font-size:0.7rem;"></span>
                <button id="logoutBtn" style="background:#aa2e78; border:none; padding:6px 12px; border-radius:20px; color:white;">Logout</button>
            </div>
        </header>
        <div id="mainContent" style="padding:20px; color:#e0e0e0;">Dashboard loaded</div>
    </div>

    <!-- Auth Container -->
    <div class="container" id="authContainer">
        <div class="form-box login">
            <form id="loginForm">
                <h1>Login</h1>
                <div class="input-box"><input type="text" id="loginAccessCode" placeholder="Access Code" required><i class='bx bxs-user'></i></div>
                <div class="input-box"><input type="password" id="loginMemberCode" placeholder="Member Code" required><i class='bx bxs-lock-alt'></i></div>
                <div class="cf-turnstile" data-sitekey="0x4AAAAAADB9qB6YsaSUFV0q"></div>
                <div class="forgot-link"><a href="#" id="forgotCodeLink">Forgot Member Code?</a></div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
        <div class="form-box register">
            <form id="registerForm">
                <h1>Sign Up</h1>
                <div id="signupStep1">
                    <div class="input-box"><input type="password" id="signupMemberCode" placeholder="Member Code" required><i class='bx bxs-lock-alt'></i></div>
                    <button type="button" id="validateMemberCodeBtn" class="btn">Validate & Continue</button>
                </div>
                <div id="signupStep2" style="display:none;">
                    <div class="input-box"><select id="communitySelect" style="background:#1a1a1a; color:white; padding:13px 20px;"><option value="">-- Select Community --</option><option value="VibeVault">Vibe Vault</option><option value="Onyx">Onyx</option><option value="RTCS">R.T.C.S</option><option value="MTT">M.T.T</option></select></div>
                    <button type="button" id="proceedToProfileBtn" class="btn">Next: Profile</button>
                    <button type="button" id="backToMemberCodeBtn" style="background:transparent; border:none; color:#aaa; margin-top:10px;">Back</button>
                </div>
                <div id="signupStep3" style="display:none;">
                    <div class="input-box"><input type="text" id="profileNickname" placeholder="Nickname"><i class='bx bxs-user'></i></div>
                    <div class="input-box"><input type="text" id="profileRealName" placeholder="Real Name"><i class='bx bxs-user'></i></div>
                    <div class="input-box"><textarea id="profileBio" rows="2" placeholder="Bio"></textarea></div>
                    <div class="input-box"><input type="date" id="profileBirthday" placeholder="Birthday"><i class='bx bxs-calendar'></i></div>
                    <div class="input-box"><input type="text" id="profileHobby" placeholder="Hobby"><i class='bx bxs-heart'></i></div>
                    <div class="input-box"><input type="file" id="signupProfilePic" accept="image/*"><i class='bx bxs-image'></i></div>
                    <div id="securityQuestionsContainer"></div>
                    <button type="button" id="addQuestionBtn" class="btn" style="background:#555;">+ Add Security Question</button>
                    <p id="securityWarning" style="color:#ffa502; font-size:12px; display:none;">⚠️ Without security questions, recovery impossible.</p>
                    <button type="button" id="finalSignupBtn" class="btn" style="margin-top:15px;">Create Account</button>
                    <button type="button" id="backToCommunityBtn2" style="background:transparent; border:none; color:#aaa; margin-top:10px;">Back</button>
                </div>
                <div class="cf-turnstile" data-sitekey="0x4AAAAAADB9qB6YsaSUFV0q" style="margin-top:15px;"></div>
            </form>
        </div>
        <div class="toggle-box">
            <div class="toggle-panel toggle-left"><h1>Hello, Resistance!</h1><p>Don't have an account?</p><button class="btn register-btn">Register</button></div>
            <div class="toggle-panel toggle-right"><h1>Welcome Back!</h1><p>Already have an account?</p><button class="btn login-btn">Login</button></div>
        </div>
    </div>

    <!-- Recovery Modal -->
    <div id="recoveryModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; justify-content:center; align-items:center;">
        <div style="background:#0a0a0a; border:1px solid #ff4757; border-radius:20px; max-width:400px; width:90%; padding:20px;">
            <h3 style="color:#ff4757;">Recover Member Code</h3>
            <input type="text" id="recoveryAccessCode" placeholder="Access Code" style="width:100%; margin:10px 0; padding:10px; background:#1a1a1a; border:1px solid #333; color:white;">
            <div id="recoveryQuestionsArea"></div>
            <button id="recoverySubmitBtn" class="btn">Submit</button>
            <button id="closeRecoveryModal" style="margin-top:10px; background:transparent; border:1px solid #aaa; padding:8px; width:100%;">Cancel</button>
        </div>
    </div>

    <div id="toastContainer" style="position:fixed; bottom:20px; right:20px; z-index:9999;"></div>
    <audio id="loginSound" preload="auto" src="https://www.image2url.com/r2/default/audio/1776411352229-249fc2dc-41dd-49ed-aa4b-c30bae3b944c.mp3"></audio>

    <script>
        // Error catcher
        window.onerror = function(message, source, lineno, colno, error) {
            const errDiv = document.getElementById('errorDisplay');
            errDiv.style.display = 'block';
            errDiv.innerHTML = `⚠️ ERROR: ${message}<br>${source}:${lineno}`;
            console.error(error);
        };
        setTimeout(() => { 
            const loading = document.getElementById('loadingCanvas');
            if(loading) loading.style.display = 'none';
        }, 2000);

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAvq0v6LeGbB0FyOhvOGCoSmc0kogCZx_4",
            authDomain: "resistance-webapp.firebaseapp.com",
            projectId: "resistance-webapp",
            storageBucket: "resistance-webapp.firebasestorage.app",
            messagingSenderId: "985571028111",
            appId: "1:985571028111:web:53d7a322dd998d7ad814fa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        let messaging = null;
        try { messaging = firebase.messaging(); } catch(e) { console.warn("Messaging not supported"); }

        const BACKEND_URL = "https://quantam-ai-1am2.onrender.com";

        function showToast(msg, isError=false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.classList.add('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#ff4757' : '#aa2e78';
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.remove(), 3000);
        }
        function escapeHTML(str) { 
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) { 
                if(m==='&') return '&amp;'; 
                if(m==='<') return '&lt;'; 
                if(m==='>') return '&gt;'; 
                return m;
            }); 
        }
        function getTurnstileToken() { 
            const elem = document.querySelector('[name="cf-turnstile-response"]');
            return elem ? elem.value : null;
        }

        let currentUser = null;
        let aiConversationId = null;
        let aiMessagesContainer = null;
        let currentTypingSpeed = 20;
        let randomModelEnabled = false;
        let currentSelectedModel = "mistralai/Mistral-7B-Instruct-v0.3";
        const availableModels = [
            { id: "mistralai/Mistral-7B-Instruct-v0.3", name: "Mistral 7B v0.3", stars: 4 },
            { id: "microsoft/phi-2", name: "Phi-2", stars: 4 },
            { id: "google/gemma-7b", name: "Gemma 7B", stars: 4 },
            { id: "Qwen/Qwen3-8B", name: "Qwen3 8B", stars: 3 },
            { id: "meta-llama/Llama-3.2-1B-Instruct", name: "Llama 3.2 1B", stars: 3 }
        ];

        function stopLoading() { 
            const el = document.getElementById('loadingCanvas');
            if(el) el.style.display = 'none'; 
        }

        // Omnius AI functions
        async function renderOmnius() {
            if (!currentUser) return;
            const aiConvRef = db.collection(`users/${currentUser.accessCode}/aiConversations`);
            const snapshot = await aiConvRef.orderBy("createdAt", "desc").get();
            let convId = null;
            let messages = [];
            if (!snapshot.empty) {
                convId = snapshot.docs[0].id;
                const msgsRef = db.collection(`users/${currentUser.accessCode}/aiConversations/${convId}/messages`);
                const msgsSnap = await msgsRef.orderBy("timestamp", "asc").get();
                messages = msgsSnap.docs.map(d => ({ role: d.data().role, content: d.data().content }));
            } else {
                const newConv = await aiConvRef.add({ createdAt: firebase.firestore.FieldValue.serverTimestamp(), title: "New conversation" });
                convId = newConv.id;
            }
            aiConversationId = convId;
            const html = `
                <div style="max-width:1000px; margin:0 auto; background:#0a0a0a; padding:1rem; border-radius:12px;">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-red-500">Omnius AI</h2>
                        <div class="flex gap-2">
                            <select id="aiModelSelect" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm">
                                ${availableModels.map(m => `<option value="${m.id}" ${currentSelectedModel === m.id ? 'selected' : ''}>${m.name} (${'★'.repeat(m.stars)})</option>`).join('')}
                            </select>
                            <button id="aiRandomToggle" class="px-2 py-1 rounded text-sm ${randomModelEnabled ? 'bg-red-600' : 'bg-gray-700'}">🎲 Random</button>
                        </div>
                    </div>
                    <div id="aiMessagesContainer" style="height: 400px; overflow-y: auto; background: #0a0a0a; border-radius: 8px; padding: 1rem; margin-bottom: 1rem;">
                        ${messages.map(msg => {
                            if (msg.role === 'user') {
                                return `<div class="mb-3 text-right"><span class="inline-block bg-red-800 text-white px-4 py-2 rounded-xl max-w-[80%]">${escapeHTML(msg.content)}</span></div>`;
                            } else {
                                let thinking = '', answer = msg.content;
                                const thinkMatch = msg.content.match(/\[Thinking\](.*?)\[Answer\]/s);
                                if (thinkMatch) {
                                    thinking = thinkMatch[1].trim();
                                    answer = msg.content.split('[Answer]')[1]?.trim() || msg.content;
                                }
                                return `<div class="mb-3">
                                            ${thinking ? `<div class="thinking-block mb-1">${marked.parse(thinking)}</div>` : ''}
                                            <div class="bg-gray-800 rounded-xl px-4 py-2 inline-block max-w-[80%]">${marked.parse(answer)}</div>
                                        </div>`;
                            }
                        }).join('')}
                    </div>
                    <div class="flex items-center gap-2 mb-2">
                        <textarea id="aiPromptInput" rows="2" class="flex-1 bg-gray-900 border border-gray-700 rounded p-2 text-sm" placeholder="Ask Omnius..."></textarea>
                        <button id="aiSendBtn" class="btn px-4 py-2 rounded">Send</button>
                    </div>
                    <div class="flex items-center gap-4 text-xs">
                        <span>Typing speed:</span>
                        <input type="range" id="typingSpeedSlider" min="0" max="100" value="${currentTypingSpeed}" class="typing-slider">
                        <span id="speedValue">${currentTypingSpeed} ms</span>
                        <button id="aiNewConvBtn" class="bg-gray-700 px-3 py-1 rounded text-xs">New Conversation</button>
                    </div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            aiMessagesContainer = document.getElementById('aiMessagesContainer');
            document.getElementById('aiModelSelect').addEventListener('change', (e) => { currentSelectedModel = e.target.value; });
            document.getElementById('aiRandomToggle').addEventListener('click', (e) => { randomModelEnabled = !randomModelEnabled; e.target.classList.toggle('bg-red-600'); });
            document.getElementById('aiSendBtn').addEventListener('click', sendAIMessage);
            document.getElementById('aiNewConvBtn').addEventListener('click', createNewAIConversation);
            const slider = document.getElementById('typingSpeedSlider');
            const speedSpan = document.getElementById('speedValue');
            slider.addEventListener('input', (e) => { currentTypingSpeed = parseInt(e.target.value); speedSpan.innerText = `${currentTypingSpeed} ms`; });
            document.getElementById('aiPromptInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAIMessage(); } });
        }

        async function sendAIMessage() {
            const inputEl = document.getElementById('aiPromptInput');
            const prompt = inputEl.value.trim();
            if (!prompt) return;
            inputEl.value = '';
            const userDiv = document.createElement('div');
            userDiv.className = 'mb-3 text-right';
            userDiv.innerHTML = `<span class="inline-block bg-red-800 text-white px-4 py-2 rounded-xl max-w-[80%]">${escapeHTML(prompt)}</span>`;
            aiMessagesContainer.appendChild(userDiv);
            await addAIMessageToDB('user', prompt);
            const typingDiv = document.createElement('div');
            typingDiv.className = 'mb-3';
            typingDiv.innerHTML = `<div class="bg-gray-800 rounded-xl px-4 py-2 inline-block max-w-[80%]"><i class="fas fa-circle-notch fa-spin"></i> Thinking...</div>`;
            aiMessagesContainer.appendChild(typingDiv);
            aiMessagesContainer.scrollTop = aiMessagesContainer.scrollHeight;

            const modelToUse = randomModelEnabled ? availableModels[Math.floor(Math.random() * availableModels.length)].id : currentSelectedModel;
            try {
                const response = await fetch(`${BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: modelToUse, messages: [{ role: 'user', content: prompt }], stream: true })
                });
                if (!response.ok) throw new Error(await response.text());
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let thinking = '', answer = '';
                let state = 'none';
                let thinkingDiv = null, answerDiv = null;
                typingDiv.remove();
                const assistantDiv = document.createElement('div');
                assistantDiv.className = 'mb-3';
                aiMessagesContainer.appendChild(assistantDiv);
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    for (let line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                const token = parsed.choices[0].delta.content;
                                if (token) {
                                    fullContent += token;
                                    if (fullContent.includes('[Thinking]') && !thinkingDiv) {
                                        state = 'thinking';
                                        thinkingDiv = document.createElement('div');
                                        thinkingDiv.className = 'thinking-block mb-1';
                                        assistantDiv.appendChild(thinkingDiv);
                                    }
                                    if (state === 'thinking') {
                                        let thinkPart = fullContent.split('[Thinking]')[1];
                                        if (thinkPart && thinkPart.includes('[Answer]')) {
                                            thinkPart = thinkPart.split('[Answer]')[0];
                                            thinking = thinkPart;
                                            state = 'answer';
                                            answerDiv = document.createElement('div');
                                            answerDiv.className = 'bg-gray-800 rounded-xl px-4 py-2 inline-block max-w-[80%]';
                                            assistantDiv.appendChild(answerDiv);
                                        } else {
                                            thinking = thinkPart;
                                        }
                                        if (thinkingDiv) thinkingDiv.innerHTML = marked.parse(thinking);
                                    } else if (state === 'answer') {
                                        answer = fullContent.split('[Answer]')[1] || fullContent;
                                        if (answerDiv) answerDiv.innerHTML = marked.parse(answer);
                                    } else {
                                        if (!answerDiv) {
                                            answerDiv = document.createElement('div');
                                            answerDiv.className = 'bg-gray-800 rounded-xl px-4 py-2 inline-block max-w-[80%]';
                                            assistantDiv.appendChild(answerDiv);
                                        }
                                        answer = fullContent;
                                        answerDiv.innerHTML = marked.parse(answer);
                                    }
                                    await new Promise(r => setTimeout(r, currentTypingSpeed));
                                    aiMessagesContainer.scrollTop = aiMessagesContainer.scrollHeight;
                                }
                            } catch(e) { console.warn(e); }
                        }
                    }
                }
                await addAIMessageToDB('assistant', fullContent);
            } catch (err) {
                typingDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'mb-3';
                errorDiv.innerHTML = `<div class="bg-red-800 rounded-xl px-4 py-2 inline-block max-w-[80%] text-red-200">Error: ${err.message}</div>`;
                aiMessagesContainer.appendChild(errorDiv);
            }
        }

        async function addAIMessageToDB(role, content) {
            if (!aiConversationId) return;
            const msgsRef = db.collection(`users/${currentUser.accessCode}/aiConversations/${aiConversationId}/messages`);
            await msgsRef.add({ role, content, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }
        async function createNewAIConversation() {
            const aiConvRef = db.collection(`users/${currentUser.accessCode}/aiConversations`);
            const newConv = await aiConvRef.add({ createdAt: firebase.firestore.FieldValue.serverTimestamp(), title: "New conversation" });
            aiConversationId = newConv.id;
            renderOmnius();
        }

        async function loadView(view) {
            if (view === 'omnius') {
                await renderOmnius();
                return;
            }
            document.getElementById('mainContent').innerHTML = `<div style="background:#0a0a0a; padding:20px;"><h2 class="text-xl font-bold text-red-500">${view.toUpperCase()}</h2><p>Feature ready.</p></div>`;
        }

        // ========== AUTH HANDLERS ==========
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const accessCode = document.getElementById('loginAccessCode').value.trim();
            const memberCode = document.getElementById('loginMemberCode').value.trim();
            const turnstileToken = getTurnstileToken();
            if (!turnstileToken) { showToast("Complete CAPTCHA", true); return; }
            if (!accessCode || !memberCode) { showToast("Enter both codes", true); return; }
            let role = null;
            if (memberCode === "AMI-021") role = "admin";
            else if (memberCode === "OE1-266") role = "moderator";
            else if (memberCode === "LAO-012") role = "leader";
            else if (memberCode === "MEI-021") role = "member";
            else { showToast("Invalid Member Code", true); return; }
            const userDoc = await db.collection('users').doc(accessCode).get();
            if (!userDoc.exists) { showToast("Access Code not found", true); return; }
            const userData = userDoc.data();
            if (userData.role !== role) { showToast("Member Code mismatch", true); return; }
            currentUser = { accessCode, ...userData };
            localStorage.setItem("resistanceUser", JSON.stringify({ accessCode, role }));
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userRoleBadge').innerText = role.toUpperCase();
            await db.collection('users').doc(accessCode).update({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
            stopLoading();
            loadView('dashboard');
            document.getElementById('loginSound').play().catch(e=>null);
        });

        let validatedRole = null, validatedMemberCode = null, tempCommunityId = null;
        document.getElementById('validateMemberCodeBtn').onclick = () => {
            const memberCode = document.getElementById('signupMemberCode').value.trim();
            if (memberCode === "AMI-021") validatedRole = "admin";
            else if (memberCode === "OE1-266") validatedRole = "moderator";
            else if (memberCode === "LAO-012") validatedRole = "leader";
            else if (memberCode === "MEI-021") validatedRole = "member";
            else { showToast("Invalid Member Code", true); return; }
            validatedMemberCode = memberCode;
            document.getElementById('signupStep1').style.display = 'none';
            document.getElementById('signupStep2').style.display = 'block';
        };
        document.getElementById('proceedToProfileBtn').onclick = () => {
            const community = document.getElementById('communitySelect').value;
            if (!community) { showToast("Select a community", true); return; }
            tempCommunityId = community;
            document.getElementById('signupStep2').style.display = 'none';
            document.getElementById('signupStep3').style.display = 'block';
        };
        document.getElementById('backToMemberCodeBtn').onclick = () => {
            document.getElementById('signupStep2').style.display = 'none';
            document.getElementById('signupStep1').style.display = 'block';
        };
        document.getElementById('backToCommunityBtn2').onclick = () => {
            document.getElementById('signupStep3').style.display = 'none';
            document.getElementById('signupStep2').style.display = 'block';
        };
        document.getElementById('addQuestionBtn').onclick = () => {
            const containerDiv = document.getElementById('securityQuestionsContainer');
            const div = document.createElement('div');
            div.className = 'security-question-item';
            div.innerHTML = `<input type="text" class="q-text" placeholder="Question" style="width:100%; margin:5px 0; padding:8px; background:#1a1a1a; border:1px solid #333; color:white;"><input type="text" class="a-text" placeholder="Answer" style="width:100%; margin-bottom:10px; padding:8px; background:#1a1a1a; border:1px solid #333; color:white;">`;
            containerDiv.appendChild(div);
            document.getElementById('securityWarning').style.display = 'block';
        };
        document.getElementById('finalSignupBtn').onclick = async () => {
            const turnstileToken = getTurnstileToken();
            if (!turnstileToken) { showToast("Complete CAPTCHA", true); return; }
            const nickname = document.getElementById('profileNickname').value.trim() || "User";
            const realName = document.getElementById('profileRealName').value.trim();
            const bio = document.getElementById('profileBio').value.trim();
            const birthday = document.getElementById('profileBirthday').value;
            const hobby = document.getElementById('profileHobby').value.trim();
            const questionDivs = document.querySelectorAll('.security-question-item');
            const securityQuestions = [];
            for (let qd of questionDivs) {
                const q = qd.querySelector('.q-text').value;
                const a = qd.querySelector('.a-text').value;
                if (q && a) {
                    const encoder = new TextEncoder();
                    const hash = await crypto.subtle.digest('SHA-256', encoder.encode(a));
                    const hashHex = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
                    securityQuestions.push({ question: q, answerHash: hashHex });
                }
            }
            const file = document.getElementById('signupProfilePic').files[0];
            try {
                const res = await fetch(`${BACKEND_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        memberCode: validatedMemberCode,
                        role: validatedRole,
                        communityId: tempCommunityId,
                        nickname, realName, bio, birthday, hobby,
                        securityQuestions,
                        turnstileToken
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Signup failed");
                const accessCode = data.accessCode;
                if (file) {
                    const storageRef = storage.ref(`profilePictures/${accessCode}`);
                    await storageRef.put(file);
                    const photoURL = await storageRef.getDownloadURL();
                    await db.collection('users').doc(accessCode).update({ photoURL });
                }
                showToast(`Account created! Your Access Code: ${accessCode}. Save it.`);
                localStorage.setItem("resistanceUser", JSON.stringify({ accessCode, role: validatedRole }));
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('userRoleBadge').innerText = validatedRole.toUpperCase();
                stopLoading();
                document.getElementById('mainContent').innerHTML = `<div style="text-align:center; margin-top:50px;"><h2>Welcome, ${escapeHTML(nickname)}</h2><p>Your Access Code: ${accessCode}</p></div>`;
            } catch(err) { showToast(err.message, true); }
        };

        // Recovery
        document.getElementById('forgotCodeLink').onclick = async (e) => {
            e.preventDefault();
            document.getElementById('recoveryModal').style.display = 'flex';
        };
        document.getElementById('closeRecoveryModal').onclick = () => document.getElementById('recoveryModal').style.display = 'none';
        document.getElementById('recoverySubmitBtn').onclick = async () => {
            const accessCode = document.getElementById('recoveryAccessCode').value.trim();
            if (!accessCode) { showToast("Enter Access Code", true); return; }
            const userDoc = await db.collection('users').doc(accessCode).get();
            if (!userDoc.exists) { showToast("Access Code not found", true); return; }
            const userData = userDoc.data();
            const questions = userData.securityQuestions;
            if (!questions || !questions.length) { showToast("No security questions set.", true); return; }
            const area = document.getElementById('recoveryQuestionsArea');
            area.innerHTML = '';
            for (let i=0; i<questions.length; i++) {
                const div = document.createElement('div');
                div.innerHTML = `<label style="color:white;">${escapeHTML(questions[i].question)}</label><input type="text" id="recAns${i}" class="recAnswer" style="width:100%; margin-bottom:10px; padding:8px; background:#1a1a1a; border:1px solid #333; color:white;">`;
                area.appendChild(div);
            }
            const answers = await new Promise((resolve) => {
                const btn = document.createElement('button');
                btn.textContent = "Verify Answers";
                btn.className = "btn";
                btn.onclick = () => {
                    const ans = [];
                    for (let i=0; i<questions.length; i++) ans.push(document.getElementById(`recAns${i}`).value.trim());
                    resolve(ans);
                };
                area.appendChild(btn);
            });
            let allMatch = true;
            for (let i=0; i<questions.length; i++) {
                const encoder = new TextEncoder();
                const hash = await crypto.subtle.digest('SHA-256', encoder.encode(answers[i]));
                const hashHex = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
                if (hashHex !== questions[i].answerHash) allMatch = false;
            }
            if (!allMatch) { showToast("Answers do not match", true); return; }
            let memberCode = "";
            if (userData.role === "admin") memberCode = "AMI-021";
            else if (userData.role === "moderator") memberCode = "OE1-266";
            else if (userData.role === "leader") memberCode = "LAO-012";
            else memberCode = "MEI-021";
            showToast(`Your Member Code: ${memberCode}`);
            document.getElementById('recoveryModal').style.display = 'none';
        };

        // Logout
        document.getElementById('logoutBtn').onclick = async () => {
            if (currentUser) await db.collection('users').doc(currentUser.accessCode).update({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
            localStorage.removeItem('resistanceUser');
            location.reload();
        };

        // UI Toggle & Navigation
        const toggleContainer = document.querySelector('.container');
        document.querySelector('.register-btn').addEventListener('click', () => toggleContainer.classList.add('active'));
        document.querySelector('.login-btn').addEventListener('click', () => toggleContainer.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const view = btn.getAttribute('data-view');
                if (view) loadView(view);
            });
        });

        // Auto-login
        (async () => {
            try {
                const saved = localStorage.getItem('resistanceUser');
                if (saved) {
                    const { accessCode, role } = JSON.parse(saved);
                    const userDoc = await db.collection('users').doc(accessCode).get();
                    if (userDoc.exists) {
                        currentUser = { accessCode, ...userDoc.data() };
                        document.getElementById('authContainer').style.display = 'none';
                        document.getElementById('app').classList.remove('hidden');
                        document.getElementById('userRoleBadge').innerText = role.toUpperCase();
                        await db.collection('users').doc(accessCode).update({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
                        stopLoading();
                        loadView('dashboard');
                    } else { localStorage.removeItem('resistanceUser'); }
                }
            } catch(e) { console.error(e); }
            setTimeout(() => stopLoading(), 100);
        })();
    </script>
</body>
</html>
