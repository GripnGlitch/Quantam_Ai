<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Omnius AI · Bayesia</title>
  <!-- Tailwind + Font Awesome + Marked + Highlight.js -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/index.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Custom styles for mode cards and banner */
    .mode-card {
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .mode-card.active-mode {
      border-color: #3b82f6;
      background-color: #eff6ff;
    }
    .dark .mode-card.active-mode {
      background-color: #1e3a8a;
      border-color: #60a5fa;
    }
    .banner {
      background: #e0f2fe;
      border-left: 4px solid #0284c7;
    }
    .dark .banner {
      background: #0c4a6e;
      border-left-color: #38bdf8;
      color: #e0f2fe;
    }
    /* existing styles */
    .node-flow { background: #f1f5f9; border-left: 4px solid #3b82f6; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; font-family: 'Fira Code', monospace; white-space: pre-wrap; }
    .dark .node-flow { background: #1e293b; border-left-color: #60a5fa; color: #e2e8f0; }
    .typing span { animation: blink 1.4s infinite; opacity: 0.4; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 50% { opacity: 1; } }
    .sidebar-open { transform: translateX(0); }
    .sidebar-closed { transform: translateX(-100%); }
    @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
    .message pre { background: #f3f4f6; padding: 0.75rem; border-radius: 0.5rem; overflow-x: auto; }
    .dark .message pre { background: #1f2937; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased">
  <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white dark:bg-gray-900 z-50">
    <div class="text-center"><i class="fas fa-circle-notch fa-spin text-4xl text-indigo-600 mb-4"></i><p class="text-gray-600 dark:text-gray-300">Initializing Omnius AI...</p></div>
  </div>

  <div id="app" class="hidden min-h-screen flex flex-col">
    <!-- Header with Omnius AI title and controls -->
    <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 py-3 px-4 flex items-center justify-between shadow-sm">
      <div class="flex items-center gap-3">
        <button id="sidebarToggle" class="md:hidden text-xl p-1"><i class="fas fa-bars"></i></button>
        <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Omnius AI</h1>
      </div>
      <div class="flex items-center gap-2">
        <!-- persona toggle (segmented) -->
        <div class="flex items-center bg-gray-100 dark:bg-gray-700 rounded-full p-1 text-sm">
          <button id="personaOmnius" class="px-3 py-1 rounded-full font-semibold transition-colors persona-btn active" data-persona="omnius">Omnius</button>
          <button id="personaPrompter" class="px-3 py-1 rounded-full font-semibold transition-colors persona-btn" data-persona="prompter">Prompter</button>
        </div>
        <!-- toggles as icons -->
        <button id="extendedToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700" title="Extended Thinking"><i class="fas fa-brain text-lg"></i></button>
        <button id="codeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700" title="Code Mode"><i class="fas fa-code text-lg"></i></button>
        <button id="darkModeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700"><i class="fas fa-moon"></i></button>
        <button id="settingsBtn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700"><i class="fas fa-cog"></i></button>
      </div>
    </header>

    <!-- Info banner -->
    <div class="banner text-sm p-3 flex items-center gap-2 text-gray-800 dark:text-gray-200">
      <i class="fas fa-info-circle text-blue-600 dark:text-blue-300"></i>
      <span>Official free app · The data is created by AI models, please verify important information.</span>
    </div>

    <!-- Mode selection cards (Gemini style) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 p-4 bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700">
      <!-- Fast card -->
      <div id="modeFastCard" class="mode-card cursor-pointer rounded-lg p-4 bg-white dark:bg-gray-800 shadow-sm hover:shadow-md transition" data-mode="fast">
        <div class="flex items-center gap-3 mb-2">
          <span class="text-2xl">🚀</span>
          <h3 class="font-semibold text-lg">Fast</h3>
        </div>
        <p class="text-sm text-gray-600 dark:text-gray-300">Instant responses, minimal reasoning</p>
      </div>
      <!-- Pro card -->
      <div id="modeProCard" class="mode-card cursor-pointer rounded-lg p-4 bg-white dark:bg-gray-800 shadow-sm hover:shadow-md transition active-mode" data-mode="pro">
        <div class="flex items-center gap-3 mb-2">
          <span class="text-2xl">⚡</span>
          <h3 class="font-semibold text-lg">Pro</h3>
        </div>
        <p class="text-sm text-gray-600 dark:text-gray-300">Balanced analysis, step-by-step logic</p>
      </div>
      <!-- Research card -->
      <div id="modeResearchCard" class="mode-card cursor-pointer rounded-lg p-4 bg-white dark:bg-gray-800 shadow-sm hover:shadow-md transition" data-mode="research">
        <div class="flex items-center gap-3 mb-2">
          <span class="text-2xl">🔬</span>
          <h3 class="font-semibold text-lg">Research</h3>
        </div>
        <p class="text-sm text-gray-600 dark:text-gray-300">Deep dive, exhaustive analysis</p>
      </div>
    </div>

    <!-- Mobile mode selector (hidden on desktop, but we keep the cards) – actually we hide the old mobile selector -->
    <!-- (the old mobile mode selector is removed, cards handle all) -->

    <!-- Main area with sidebar and chat -->
    <div class="flex flex-1 overflow-hidden relative">
      <!-- sidebar (chat history) unchanged -->
      <aside id="sidebar" class="sidebar-closed md:translate-x-0 absolute md:static z-20 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 h-full transition-transform duration-200 flex flex-col">
        <div class="p-3 border-b border-gray-200 dark:border-gray-700">
          <button id="newChatBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg py-2 px-3 flex items-center gap-2 text-sm font-medium"><i class="fas fa-plus"></i> New chat</button>
        </div>
        <div id="chatHistoryList" class="flex-1 overflow-y-auto p-2 space-y-1 text-sm"></div>
        <div class="p-3 border-t border-gray-200 dark:border-gray-700 text-xs text-gray-500 truncate flex items-center gap-2"><i class="fas fa-user-circle"></i><span id="userIdDisplay"></span></div>
      </aside>

      <!-- main chat -->
      <main class="flex-1 flex flex-col min-w-0 bg-gray-50 dark:bg-gray-900">
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <!-- input area unchanged -->
        <div class="border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-3">
          <div class="max-w-4xl mx-auto flex gap-2 items-end">
            <div class="flex-1 relative">
              <textarea id="userInput" rows="1" placeholder="Message Omnius..." class="w-full resize-none border border-gray-300 dark:border-gray-600 rounded-2xl py-3 px-4 pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700 dark:text-white max-h-40"></textarea>
              <button id="sendBtn" class="absolute right-2 bottom-2 p-2 text-indigo-600 hover:bg-indigo-50 dark:hover:bg-gray-600 rounded-full"><i class="fas fa-arrow-up"></i></button>
            </div>
          </div>
          <div class="max-w-4xl mx-auto flex justify-between items-center mt-1 text-xs text-gray-400 px-2">
            <span id="modelIndicator" class="font-mono"></span>
            <span id="modeIndicator"></span>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- settings modal (unchanged) -->
  <div id="settingsModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden p-4">
    <div class="bg-white dark:bg-gray-800 rounded-xl max-w-md w-full p-5 shadow-xl">
      <h2 class="text-lg font-semibold mb-4 flex justify-between items-center">Settings <button id="closeSettings"><i class="fas fa-times"></i></button></h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Select Model</label>
          <select id="modelSelect" class="w-full border rounded-lg p-2 dark:bg-gray-700 dark:border-gray-600"></select>
          <div class="mt-1 text-xs text-gray-500 flex items-center gap-1"><span>Intelligence:</span><span id="modelStars" class="text-amber-500">★★★★★</span></div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">System Prompt (global)</label>
          <textarea id="globalSystemPrompt" rows="4" class="w-full border rounded-lg p-2 dark:bg-gray-700 dark:border-gray-600" placeholder="Optional system prompt..."></textarea>
        </div>
        <button id="saveSettings" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg">Save</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---- CONFIG ----
      const BACKEND_URL = 'https://quantam-ai-1am2.onrender.com/api/chat';
      const SUPABASE_URL = 'https://uvjasmmokcjmpawrnzoz.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2amFzbW1va2NqbXBhd3Juem96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNzM4MjAsImV4cCI6MjA4Nzc0OTgyMH0.aS2qgAOL1OwVVr-7ok2z0M3DiaDK-rCdjLp-1moXFqA';

      let supabase = null;
      try {
        supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase initialized');
      } catch (e) { 
        console.warn('Supabase init failed, using localStorage fallback.', e); 
      }

      // ---- MODEL LIST (unchanged) ----
      const models = [ /* ... same as before ... */ ];

      // ---- GLOBAL STATE ----
      let currentUser = { id: localStorage.getItem('omniusUserId') || generateUserId(), chats: [] };
      let currentChatId = null;
      let currentPersona = 'omnius';
      let currentMode = 'pro';
      let extendedThinking = false;
      let codeMode = false;
      let darkMode = localStorage.getItem('darkMode') === 'true';
      let selectedModel = localStorage.getItem('selectedModel') || models[0].id;
      let globalSystemPrompt = localStorage.getItem('globalSystemPrompt') || '';

      function generateUserId() { return 'user_' + Math.random().toString(36).substring(2,15) + Date.now().toString(36); }
      localStorage.setItem('omniusUserId', currentUser.id);
      const userIdSpan = document.getElementById('userIdDisplay');
      if (userIdSpan) userIdSpan.innerText = currentUser.id.slice(0,8) + '...';
      if (darkMode) document.documentElement.classList.add('dark');

      // ---- load chats (same as before) ----
      async function loadUserChats() { /* ... unchanged ... */ }
      function fallbackLoadChats() { /* ... unchanged ... */ }
      async function saveChats() { /* ... unchanged ... */ }
      function createNewChat() { /* ... unchanged ... */ }
      function loadChat(chatId) { /* ... unchanged ... */ }
      function renderChatHistory() { /* ... unchanged ... */ }
      function deleteChat(chatId) { /* ... unchanged ... */ }
      function renderMessages(messages) { /* ... unchanged ... */ }

      // ---- UI event listeners ----
      // Persona toggle
      document.querySelectorAll('.persona-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active', 'bg-indigo-600', 'text-white'));
          btn.classList.add('active', 'bg-indigo-600', 'text-white');
          currentPersona = btn.dataset.persona;
        });
      });
      document.querySelector('[data-persona="omnius"]').classList.add('active', 'bg-indigo-600', 'text-white');

      // Mode cards
      function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-card').forEach(card => {
          card.classList.remove('active-mode');
          if (card.dataset.mode === mode) {
            card.classList.add('active-mode');
          }
        });
        document.getElementById('modeIndicator').innerText = mode.toUpperCase();
      }
      document.querySelectorAll('.mode-card').forEach(card => {
        card.addEventListener('click', () => setMode(card.dataset.mode));
      });
      setMode('pro'); // initial

      // Toggles
      document.getElementById('extendedToggle').addEventListener('click', (e) => { extendedThinking = !extendedThinking; e.currentTarget.classList.toggle('text-indigo-600', extendedThinking); });
      document.getElementById('codeToggle').addEventListener('click', (e) => { codeMode = !codeMode; e.currentTarget.classList.toggle('text-indigo-600', codeMode); });
      document.getElementById('darkModeToggle').addEventListener('click', () => { darkMode = !darkMode; document.documentElement.classList.toggle('dark', darkMode); localStorage.setItem('darkMode', darkMode); });

      // Settings modal
      const settingsModal = document.getElementById('settingsModal');
      document.getElementById('settingsBtn').addEventListener('click', () => {
        const select = document.getElementById('modelSelect');
        select.innerHTML = '';
        models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = `${m.name} (${'★'.repeat(m.stars)})`;
          if (m.id === selectedModel) opt.selected = true;
          select.appendChild(opt);
        });
        updateStars(selectedModel);
        document.getElementById('globalSystemPrompt').value = globalSystemPrompt;
        settingsModal.classList.remove('hidden');
      });
      document.getElementById('closeSettings').addEventListener('click', () => settingsModal.classList.add('hidden'));
      document.getElementById('modelSelect').addEventListener('change', (e) => updateStars(e.target.value));
      function updateStars(modelId) {
        const model = models.find(m => m.id === modelId);
        if (model) document.getElementById('modelStars').innerHTML = '★'.repeat(model.stars) + '☆'.repeat(5-model.stars);
      }
      document.getElementById('saveSettings').addEventListener('click', () => {
        selectedModel = document.getElementById('modelSelect').value;
        globalSystemPrompt = document.getElementById('globalSystemPrompt').value;
        localStorage.setItem('selectedModel', selectedModel);
        localStorage.setItem('globalSystemPrompt', globalSystemPrompt);
        document.getElementById('modelIndicator').innerText = models.find(m => m.id === selectedModel)?.name || selectedModel;
        settingsModal.classList.add('hidden');
      });

      // ---- send message (unchanged) ----
      async function sendMessage() { /* ... unchanged ... */ }

      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      document.getElementById('userInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

      // ---- init ----
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      loadUserChats();
      document.getElementById('modelIndicator').innerText = models.find(m => m.id === selectedModel)?.name || selectedModel;
      document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar')?.classList.toggle('sidebar-closed'));
      document.getElementById('newChatBtn').addEventListener('click', createNewChat);
    })();
  </script>
  <!-- Eruda console for mobile debugging -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</body>
  </html>
