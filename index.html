<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Omnius AI · Bayesia</title>
  <!-- Tailwind + Font Awesome + Marked + Highlight.js -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/index.min.js"></script>
  <!-- Supabase (optional – replace credentials or it will fallback to localStorage) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .node-flow { background: #f1f5f9; border-left: 4px solid #3b82f6; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0; font-family: 'Fira Code', monospace; white-space: pre-wrap; }
    .dark .node-flow { background: #1e293b; border-left-color: #60a5fa; color: #e2e8f0; }
    .typing span { animation: blink 1.4s infinite; opacity: 0.4; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 50% { opacity: 1; } }
    .sidebar-open { transform: translateX(0); }
    .sidebar-closed { transform: translateX(-100%); }
    @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
    .message pre { background: #f3f4f6; padding: 0.75rem; border-radius: 0.5rem; overflow-x: auto; }
    .dark .message pre { background: #1f2937; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased">
  <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white dark:bg-gray-900 z-50">
    <div class="text-center"><i class="fas fa-circle-notch fa-spin text-4xl text-indigo-600 mb-4"></i><p class="text-gray-600 dark:text-gray-300">Initializing Omnius AI...</p></div>
  </div>

  <div id="app" class="hidden min-h-screen flex flex-col">
    <!-- header -->
    <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 py-2 px-4 flex items-center justify-between shadow-sm">
      <div class="flex items-center gap-2">
        <button id="sidebarToggle" class="md:hidden text-xl p-1"><i class="fas fa-bars"></i></button>
        <!-- persona toggle -->
        <div class="flex items-center bg-gray-100 dark:bg-gray-700 rounded-full p-1 text-sm">
          <button id="personaOmnius" class="px-3 py-1 rounded-full font-semibold transition-colors persona-btn active" data-persona="omnius">Omnius AI</button>
          <button id="personaPrompter" class="px-3 py-1 rounded-full font-semibold transition-colors persona-btn" data-persona="prompter">AI Prompter</button>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <div class="hidden md:flex items-center bg-gray-100 dark:bg-gray-700 rounded-full p-1 text-xs mr-2">
          <button id="modeFast" class="px-3 py-1 rounded-full mode-btn" data-mode="fast">🚀 Fast</button>
          <button id="modePro" class="px-3 py-1 rounded-full mode-btn active-mode" data-mode="pro">⚡ Pro</button>
          <button id="modeResearch" class="px-3 py-1 rounded-full mode-btn" data-mode="research">🔬 Research</button>
        </div>
        <button id="extendedToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700" title="Extended Thinking"><i class="fas fa-brain text-lg"></i></button>
        <button id="codeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700" title="Code Mode"><i class="fas fa-code text-lg"></i></button>
        <button id="darkModeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700"><i class="fas fa-moon"></i></button>
        <button id="settingsBtn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700"><i class="fas fa-cog"></i></button>
      </div>
    </header>

    <!-- mobile mode selector -->
    <div class="md:hidden flex justify-center bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 py-2 px-4 gap-2 text-xs">
      <button id="mobileModeFast" class="px-3 py-1 rounded-full mode-btn-mobile" data-mode="fast">🚀 Fast</button>
      <button id="mobileModePro" class="px-3 py-1 rounded-full mode-btn-mobile active-mode" data-mode="pro">⚡ Pro</button>
      <button id="mobileModeResearch" class="px-3 py-1 rounded-full mode-btn-mobile" data-mode="research">🔬 Research</button>
    </div>

    <div class="flex flex-1 overflow-hidden relative">
      <!-- sidebar -->
      <aside id="sidebar" class="sidebar-closed md:translate-x-0 absolute md:static z-20 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 h-full transition-transform duration-200 flex flex-col">
        <div class="p-3 border-b border-gray-200 dark:border-gray-700">
          <button id="newChatBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg py-2 px-3 flex items-center gap-2 text-sm font-medium"><i class="fas fa-plus"></i> New chat</button>
        </div>
        <div id="chatHistoryList" class="flex-1 overflow-y-auto p-2 space-y-1 text-sm"></div>
        <div class="p-3 border-t border-gray-200 dark:border-gray-700 text-xs text-gray-500 truncate flex items-center gap-2"><i class="fas fa-user-circle"></i><span id="userIdDisplay"></span></div>
      </aside>

      <!-- main chat -->
      <main class="flex-1 flex flex-col min-w-0 bg-gray-50 dark:bg-gray-900">
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-3">
          <div class="max-w-4xl mx-auto flex gap-2 items-end">
            <div class="flex-1 relative">
              <textarea id="userInput" rows="1" placeholder="Message Omnius..." class="w-full resize-none border border-gray-300 dark:border-gray-600 rounded-2xl py-3 px-4 pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700 dark:text-white max-h-40"></textarea>
              <button id="sendBtn" class="absolute right-2 bottom-2 p-2 text-indigo-600 hover:bg-indigo-50 dark:hover:bg-gray-600 rounded-full"><i class="fas fa-arrow-up"></i></button>
            </div>
          </div>
          <div class="max-w-4xl mx-auto flex justify-between items-center mt-1 text-xs text-gray-400 px-2">
            <span id="modelIndicator" class="font-mono"></span>
            <span id="modeIndicator"></span>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- settings modal -->
  <div id="settingsModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden p-4">
    <div class="bg-white dark:bg-gray-800 rounded-xl max-w-md w-full p-5 shadow-xl">
      <h2 class="text-lg font-semibold mb-4 flex justify-between items-center">Settings <button id="closeSettings"><i class="fas fa-times"></i></button></h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Select Model</label>
          <select id="modelSelect" class="w-full border rounded-lg p-2 dark:bg-gray-700 dark:border-gray-600"></select>
          <div class="mt-1 text-xs text-gray-500 flex items-center gap-1"><span>Intelligence:</span><span id="modelStars" class="text-amber-500">★★★★★</span></div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">System Prompt (global)</label>
          <textarea id="globalSystemPrompt" rows="4" class="w-full border rounded-lg p-2 dark:bg-gray-700 dark:border-gray-600" placeholder="Optional system prompt..."></textarea>
        </div>
        <button id="saveSettings" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg">Save</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---- CONFIG: Your Render backend URL (replace after deploying backend) ----
      const BACKEND_URL = 'https://quantam-ai.onrender.com'
      const SUPABASE_ANON_KEY ='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2amFzbW1va2NqbXBhd3Juem96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNzM4MjAsImV4cCI6MjA4Nzc0OTgyMH0.aS2qgAOL1OwVVr-7ok2z0M3DiaDK-rCdjLp-1moXFqA';
      let supabase = null;
      try {
        if (!SUPABASE_URL.includes('your-project')) {
          supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
          console.warn('Supabase not configured, using localStorage fallback.');
        }
      } catch (e) { console.warn('Supabase init failed, using localStorage fallback.'); }

      // ---- MODEL LIST (same as before) ----
      const models = [
        { id: 'arcee-ai/trinity-large-preview:free', name: 'Trinity Large', stars: 5 },
        { id: 'stepfun/step-3.5-flash:free', name: 'Step 3.5 Flash', stars: 4 },
        { id: 'z-ai/glm-4.5-air:free', name: 'GLM 4.5 Air', stars: 4 },
        { id: 'nvidia/nemotron-3-nano-30b-a3b:free', name: 'Nemotron Nano 30B', stars: 4 },
        { id: 'upstage/solar-pro-3:free', name: 'Solar Pro 3', stars: 5 },
        { id: 'arcee-ai/trinity-mini:free', name: 'Trinity Mini', stars: 3 },
        { id: 'openai/gpt-oss-120b:free', name: 'GPT-OSS 120B', stars: 5 },
        { id: 'nvidia/nemotron-nano-9b-v2:free', name: 'Nemotron 9B', stars: 3 },
        { id: 'nvidia/nemotron-nano-12b-v2-vl:free', name: 'Nemotron 12B VL', stars: 3 },
        { id: 'meta-llama/llama-3.3-70b-instruct:free', name: 'Llama 3.3 70B', stars: 5 },
        { id: 'openai/gpt-oss-20b:free', name: 'GPT-OSS 20B', stars: 4 },
        { id: 'google/gemma-3-27b-it:free', name: 'Gemma 3 27B', stars: 4 },
        { id: 'liquid/lfm-2.5-1.2b-thinking:free', name: 'LFM 1.2B Thinking', stars: 2 },
        { id: 'qwen/qwen3-next-80b-a3b-instruct:free', name: 'Qwen3 Next 80B', stars: 5 },
        { id: 'qwen/qwen3-coder:free', name: 'Qwen3 Coder', stars: 4 },
        { id: 'liquid/lfm-2.5-1.2b-instruct:free', name: 'LFM 1.2B', stars: 2 },
        { id: 'cognitivecomputations/dolphin-mistral-24b-venice-edition:free', name: 'Dolphin Mistral 24B', stars: 4 },
        { id: 'mistralai/mistral-small-3.1-24b-instruct:free', name: 'Mistral Small 24B', stars: 4 },
        { id: 'nousresearch/hermes-3-llama-3.1-405b:free', name: 'Hermes 3 405B', stars: 5 },
        { id: 'qwen/qwen3-4b:free', name: 'Qwen3 4B', stars: 3 },
        { id: 'google/gemma-3n-e4b-it:free', name: 'Gemma 3N 4B', stars: 3 },
        { id: 'google/gemma-3-4b-it:free', name: 'Gemma 3 4B', stars: 3 },
        { id: 'meta-llama/llama-3.2-3b-instruct:free', name: 'Llama 3.2 3B', stars: 2 },
        { id: 'google/gemma-3-12b-it:free', name: 'Gemma 3 12B', stars: 3 },
        { id: 'google/gemma-3n-e2b-it:free', name: 'Gemma 3N 2B', stars: 2 },
        { id: 'nvidia/llama-nemotron-embed-vl-1b-v2:free', name: 'Nemotron Embed 1B', stars: 1 },
        { id: 'openrouter/free', name: 'OpenRouter Fallback', stars: 3 }
      ];

      // ---- GLOBAL STATE ----
      let currentUser = { id: localStorage.getItem('omniusUserId') || generateUserId(), chats: [] };
      let currentChatId = null;
      let currentPersona = 'omnius';
      let currentMode = 'pro';
      let extendedThinking = false;
      let codeMode = false;
      let darkMode = localStorage.getItem('darkMode') === 'true';
      let selectedModel = localStorage.getItem('selectedModel') || models[0].id;
      let globalSystemPrompt = localStorage.getItem('globalSystemPrompt') || '';

      function generateUserId() { return 'user_' + Math.random().toString(36).substring(2,15) + Date.now().toString(36); }
      localStorage.setItem('omniusUserId', currentUser.id);
      document.getElementById('userIdDisplay').innerText = currentUser.id.slice(0,8) + '...';
      if (darkMode) document.documentElement.classList.add('dark');

      // ---- load chats (Supabase or localStorage) ----
      async function loadUserChats() {
        if (supabase) {
          const { data, error } = await supabase.from('chats').select('*').eq('user_id', currentUser.id).order('updated_at', { ascending: false });
          if (!error && data) {
            currentUser.chats = data.map(row => ({ id: row.id, name: row.name, messages: row.messages || [], createdAt: row.created_at, updatedAt: row.updated_at }));
          } else fallbackLoadChats();
        } else fallbackLoadChats();
        renderChatHistory();
        if (currentUser.chats.length === 0) createNewChat();
        else loadChat(currentUser.chats[0].id);
      }
      function fallbackLoadChats() {
        const stored = localStorage.getItem(`chats_${currentUser.id}`);
        try { currentUser.chats = stored ? JSON.parse(stored) : []; } catch { currentUser.chats = []; }
      }
      async function saveChats() {
        if (supabase) {
          for (let chat of currentUser.chats) {
            await supabase.from('chats').upsert({ id: chat.id, user_id: currentUser.id, name: chat.name, messages: chat.messages, updated_at: new Date().toISOString() });
          }
        }
        localStorage.setItem(`chats_${currentUser.id}`, JSON.stringify(currentUser.chats));
      }
      function createNewChat() {
        const chatId = 'chat_' + Date.now() + '_' + Math.random().toString(36).substring(2,8);
        currentUser.chats.unshift({ id: chatId, name: 'New conversation', messages: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
        saveChats(); renderChatHistory(); loadChat(chatId);
      }
      function loadChat(chatId) {
        currentChatId = chatId;
        const chat = currentUser.chats.find(c => c.id === chatId);
        if (chat) renderMessages(chat.messages);
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('bg-gray-200','dark:bg-gray-700'));
        const activeEl = document.getElementById(`chat-${chatId}`);
        if (activeEl) activeEl.classList.add('bg-gray-200','dark:bg-gray-700');
      }
      function renderChatHistory() {
        const container = document.getElementById('chatHistoryList');
        container.innerHTML = '';
        currentUser.chats.forEach(chat => {
          const div = document.createElement('div');
          div.id = `chat-${chat.id}`;
          div.className = 'chat-item p-2 rounded cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 flex justify-between items-center';
          div.innerHTML = `<span class="truncate">${chat.name}</span><button class="delete-chat text-red-500 hover:text-red-700" data-id="${chat.id}"><i class="fas fa-trash"></i></button>`;
          div.addEventListener('click', (e) => { if (!e.target.closest('.delete-chat')) loadChat(chat.id); });
          div.querySelector('.delete-chat').addEventListener('click', (e) => { e.stopPropagation(); deleteChat(chat.id); });
          container.appendChild(div);
        });
      }
      function deleteChat(chatId) {
        currentUser.chats = currentUser.chats.filter(c => c.id !== chatId);
        if (currentChatId === chatId) currentUser.chats.length > 0 ? loadChat(currentUser.chats[0].id) : createNewChat();
        saveChats(); renderChatHistory();
      }
      function renderMessages(messages) {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        messages.forEach(msg => {
          const messageDiv = document.createElement('div');
          messageDiv.className = `message ${msg.role === 'user' ? 'text-right' : 'text-left'} mb-4`;
          const bubble = document.createElement('div');
          bubble.className = `inline-block p-3 rounded-lg max-w-[80%] ${msg.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white'}`;
          if (msg.role === 'assistant' && msg.nodeFlow) {
            bubble.innerHTML = `<div class="node-flow">${marked.parse(msg.nodeFlow)}</div>` + marked.parse(msg.content);
          } else {
            bubble.innerHTML = marked.parse(msg.content || '');
          }
          messageDiv.appendChild(bubble);
          container.appendChild(messageDiv);
        });
        container.scrollTop = container.scrollHeight;
        document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      }

      // ---- UI event listeners (persona, modes, toggles, dark mode, settings) ----
      document.querySelectorAll('.persona-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active','bg-indigo-600','text-white'));
          btn.classList.add('active','bg-indigo-600','text-white');
          currentPersona = btn.dataset.persona;
        });
      });
      document.querySelector('[data-persona="omnius"]').classList.add('active','bg-indigo-600','text-white');

      function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn, .mode-btn-mobile').forEach(b => {
          b.classList.remove('active-mode','bg-indigo-600','text-white');
          if (b.dataset.mode === mode) b.classList.add('active-mode','bg-indigo-600','text-white');
        });
        document.getElementById('modeIndicator').innerText = mode.toUpperCase();
      }
      document.querySelectorAll('.mode-btn, .mode-btn-mobile').forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
      setMode('pro');

      document.getElementById('extendedToggle').addEventListener('click', (e) => { extendedThinking = !extendedThinking; e.currentTarget.classList.toggle('text-indigo-600', extendedThinking); });
      document.getElementById('codeToggle').addEventListener('click', (e) => { codeMode = !codeMode; e.currentTarget.classList.toggle('text-indigo-600', codeMode); });
      document.getElementById('darkModeToggle').addEventListener('click', () => { darkMode = !darkMode; document.documentElement.classList.toggle('dark', darkMode); localStorage.setItem('darkMode', darkMode); });

      // settings modal
      const settingsModal = document.getElementById('settingsModal');
      document.getElementById('settingsBtn').addEventListener('click', () => {
        const select = document.getElementById('modelSelect');
        select.innerHTML = '';
        models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = `${m.name} (${'★'.repeat(m.stars)})`;
          if (m.id === selectedModel) opt.selected = true;
          select.appendChild(opt);
        });
        updateStars(selectedModel);
        document.getElementById('globalSystemPrompt').value = globalSystemPrompt;
        settingsModal.classList.remove('hidden');
      });
      document.getElementById('closeSettings').addEventListener('click', () => settingsModal.classList.add('hidden'));
      document.getElementById('modelSelect').addEventListener('change', (e) => updateStars(e.target.value));
      function updateStars(modelId) {
        const model = models.find(m => m.id === modelId);
        if (model) document.getElementById('modelStars').innerHTML = '★'.repeat(model.stars) + '☆'.repeat(5-model.stars);
      }
      document.getElementById('saveSettings').addEventListener('click', () => {
        selectedModel = document.getElementById('modelSelect').value;
        globalSystemPrompt = document.getElementById('globalSystemPrompt').value;
        localStorage.setItem('selectedModel', selectedModel);
        localStorage.setItem('globalSystemPrompt', globalSystemPrompt);
        document.getElementById('modelIndicator').innerText = models.find(m => m.id === selectedModel)?.name || selectedModel;
        settingsModal.classList.add('hidden');
      });

      // ---- send message via backend ----
      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      document.getElementById('userInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

      async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';

        const chat = currentUser.chats.find(c => c.id === currentChatId);
        if (!chat) return;
        chat.messages.push({ role: 'user', content: text });
        renderMessages(chat.messages);
        saveChats();

        const typingId = 'typing-' + Date.now();
        const typingDiv = document.createElement('div');
        typingDiv.id = typingId;
        typingDiv.className = 'message text-left mb-4 typing';
        typingDiv.innerHTML = `<div class="inline-block p-3 rounded-lg bg-gray-200 dark:bg-gray-700"><span>.</span><span>.</span><span>.</span></div>`;
        document.getElementById('chatMessages').appendChild(typingDiv);
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;

        let systemContent = '';
        if (currentPersona === 'omnius') {
          systemContent = `You are Omnius AI, a general assistant. Current mode: ${currentMode}. ${extendedThinking ? 'Use extended thinking.' : ''} ${codeMode ? 'Prioritize code.' : ''}`;
        } else {
          systemContent = `You are AI Prompter, a master prompt architect. Always output a perfect prompt using the six-element structure. ${codeMode ? 'Focus on code prompts.' : ''}`;
        }
        if (globalSystemPrompt) systemContent += '\n' + globalSystemPrompt;

        const messagesForAPI = [
          { role: 'system', content: systemContent },
          ...chat.messages.slice(-10).map(m => ({ role: m.role, content: m.content }))
        ];

        try {
          const response = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: selectedModel, messages: messagesForAPI, stream: true })
          });
          if (!response.ok) throw new Error(`Backend error: ${response.status}`);

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let assistantMessage = '';
          let nodeFlow = '';

          document.getElementById(typingId)?.remove();
          const msgDiv = document.createElement('div');
          msgDiv.className = 'message text-left mb-4';
          const bubble = document.createElement('div');
          bubble.className = 'inline-block p-3 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white max-w-[80%]';
          msgDiv.appendChild(bubble);
          document.getElementById('chatMessages').appendChild(msgDiv);

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');
            for (let line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (data === '[DONE]') continue;
                try {
                  const parsed = JSON.parse(data);
                  const token = parsed.choices[0].delta.content;
                  if (token) {
                    assistantMessage += token;
                    bubble.innerHTML = marked.parse(assistantMessage);
                    document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
                  }
                } catch (e) { }
              }
            }
          }

          if (currentMode !== 'fast') {
            const reasoningRes = await fetch(BACKEND_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: selectedModel,
                messages: [
                  { role: 'system', content: 'Provide a step-by-step reasoning for the last answer, formatted as a node flow like:\n[START] ...\n  → [Node 1] ...\n    → [Node 1a] ...' },
                  { role: 'user', content: `Question: ${text}\nAnswer: ${assistantMessage}` }
                ],
                stream: false
              })
            });
            const reasoningData = await reasoningRes.json();
            nodeFlow = reasoningData.choices?.[0]?.message?.content || 'Unable to generate reasoning.';
            const flowDiv = document.createElement('div');
            flowDiv.className = 'node-flow mt-2';
            flowDiv.innerHTML = marked.parse(nodeFlow);
            bubble.appendChild(flowDiv);
          }

          chat.messages.push({ role: 'assistant', content: assistantMessage, nodeFlow });
          saveChats();

        } catch (error) {
          document.getElementById(typingId)?.remove();
          const errorDiv = document.createElement('div');
          errorDiv.className = 'message text-left mb-4';
          errorDiv.innerHTML = `<div class="inline-block p-3 rounded-lg bg-red-100 text-red-800">Error: ${error.message}</div>`;
          document.getElementById('chatMessages').appendChild(errorDiv);
        }
      }

      // ---- init ----
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      loadUserChats();
      document.getElementById('modelIndicator').innerText = models.find(m => m.id === selectedModel)?.name || selectedModel;
      document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('sidebar-closed'));
      document.getElementById('newChatBtn').addEventListener('click', createNewChat);
    })();
  </script>
</body>
                                                                                                                                                                                 </html>
